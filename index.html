<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#10b981" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/logo.png">
    <link rel="apple-touch-startup-image" href="/Logo2.png">
    <title>Sync 727 - מערכת ניהול קבוצה</title>
    <script>
      // Suppress benign WebSocket errors caused by disabled HMR in this environment
      window.addEventListener('error', (event) => {
        if (event.message === 'Script error.' || (event.message && (event.message.includes('WebSocket closed without opened') || event.message.includes('failed to connect to websocket')))) {
          event.stopImmediatePropagation();
          event.preventDefault();
        }
      });
      window.addEventListener('unhandledrejection', (event) => {
        if (event.reason && (event.reason.message && (event.reason.message.includes('WebSocket closed without opened') || event.reason.message.includes('failed to connect to websocket')))) {
          event.stopImmediatePropagation();
          event.preventDefault();
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main-app.tsx"></script>
  </body>
</html>
